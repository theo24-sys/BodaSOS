<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}BodaSOS{% endblock %}</title>
    {% load static %}
    <link rel="icon" type="image/png" href="{% static 'dispatch/bodasos-icon.png' %}">
    <style>
      :root {
        color-scheme: light;
        --bg: #0b1220;
        --panel: #111a2e;
        --panel-soft: #17233d;
        --text: #f4f7fb;
        --muted: #a9b4c7;
        --accent: #ffb000;
        --accent-2: #28c76f;
        --danger: #ff4d4f;
        --border: rgba(255,255,255,.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          linear-gradient(rgba(8,16,29,.78), rgba(8,16,29,.78)),
          url('{% static "dispatch/bodasos-bg.png" %}') center/cover fixed no-repeat,
          radial-gradient(circle at top left, rgba(255,176,0,.18), transparent 28%),
          radial-gradient(circle at top right, rgba(40,199,111,.12), transparent 24%),
          linear-gradient(180deg, #08101d 0%, #0b1220 100%);
        color: var(--text);
      }
      a { color: inherit; }
      .container { max-width: 1180px; margin: 0 auto; padding: 24px; }
      .hero {
        padding: 40px 0 24px;
        display: grid;
        gap: 16px;
      }
      .eyebrow {
        color: var(--accent);
        text-transform: uppercase;
        letter-spacing: .12em;
        font-size: .82rem;
        font-weight: 700;
      }
      h1 { margin: 0; font-size: clamp(2rem, 4vw, 4rem); line-height: .95; max-width: 12ch; }
      .subhead { max-width: 70ch; color: var(--muted); font-size: 1.05rem; line-height: 1.6; }
      .grid {
        display: grid;
        grid-template-columns: repeat(12, 1fr);
        gap: 18px;
      }
      .card {
        background: rgba(17,26,46,.84);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,.28);
        backdrop-filter: blur(8px);
      }
      .panel-title { margin: 0 0 12px; font-size: 1.05rem; }
      .panel-head { display: flex; justify-content: space-between; align-items: center; gap: 12px; margin-bottom: 12px; }
      .stack-form p { margin: 0 0 14px; }
      .card h2, .card h3 { margin-top: 0; }
      .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
      .stat { background: rgba(255,255,255,.03); border: 1px solid var(--border); border-radius: 16px; padding: 16px; }
      .stat strong { display: block; font-size: 1.4rem; }
      .stat span { color: var(--muted); font-size: .9rem; }
      .button, button, input[type="submit"] {
        display: inline-flex; align-items: center; justify-content: center;
        border: 0; border-radius: 14px; padding: 12px 16px;
        background: linear-gradient(135deg, var(--accent), #ff7a18);
        color: #10131a; font-weight: 800; text-decoration: none; cursor: pointer;
      }
      .button.secondary { background: rgba(255,255,255,.06); color: var(--text); border: 1px solid var(--border); }
      label { display: block; margin: 12px 0 6px; color: var(--muted); font-size: .92rem; }
      input, select, textarea {
        width: 100%; padding: 12px 14px; border-radius: 12px;
        border: 1px solid var(--border); background: rgba(255,255,255,.04); color: var(--text);
      }
      textarea { min-height: 100px; resize: vertical; }
      .hint { color: var(--muted); font-size: .92rem; line-height: 1.5; }
      .split-output { margin-top: 14px; padding: 12px 14px; border-radius: 14px; background: rgba(255,255,255,.04); border: 1px dashed var(--border); color: var(--muted); }
      .map-shell { min-height: 420px; border-radius: 16px; overflow: hidden; background: #0a1120; border: 1px solid var(--border); }
      table { width: 100%; border-collapse: collapse; }
      th, td { text-align: left; padding: 12px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
      .badge { padding: 6px 10px; border-radius: 999px; background: rgba(255,255,255,.08); display: inline-block; }
      .messages { list-style: none; padding: 0; margin: 0 0 16px; }
      .messages li { padding: 12px 14px; border-radius: 12px; margin-bottom: 10px; background: rgba(40,199,111,.14); border: 1px solid rgba(40,199,111,.24); }
      .col-12 { grid-column: span 12; }
      .col-8 { grid-column: span 8; }
      .col-4 { grid-column: span 4; }
      @media (max-width: 900px) {
        .stats, .grid { grid-template-columns: 1fr; }
        .col-12, .col-8, .col-4 { grid-column: span 12; }
        .panel-head { flex-direction: column; align-items: flex-start; }
        .map-shell { min-height: 320px; }
      }
    </style>
  </head>
  <body>
    <div class="container">
      {% if messages %}
        <ul class="messages">
          {% for message in messages %}
            <li>{{ message }}</li>
          {% endfor %}
        </ul>
      {% endif %}
      {% block content %}{% endblock %}
    </div>
  </body>
</html>
