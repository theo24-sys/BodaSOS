{% extends "dispatch/base.html" %}
{% block content %}
<section class="hero">
  <div class="eyebrow">{{ title }}</div>
  <h1>{{ title }}</h1>
  <p class="subhead">Use this form to test the dispatch flow in the browser.</p>
</section>
<div class="card">
  <form method="post" {% if multipart %}enctype="multipart/form-data"{% endif %}>
    {% csrf_token %}
    {{ form.as_p }}
    <input type="submit" value="Submit">
  </form>
</div>
{% endblock %}
