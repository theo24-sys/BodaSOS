{% extends "base.html" %}
{% block content %}
<div class="mx-auto flex min-h-[calc(100vh-72px)] max-w-3xl flex-col items-center justify-center gap-6 px-4 text-center">
	<button id="sos-button" class="flex h-56 w-56 items-center justify-center rounded-full bg-[#DC2626] text-5xl font-black text-white shadow-2xl shadow-red-200 transition-transform duration-200 hover:scale-105">SOS</button>
	<div class="flex flex-wrap justify-center gap-3">
		<button class="emergency-type rounded-full bg-[#F3F4F6] px-4 py-2 font-semibold" data-type="accident">Accident</button>
		<button class="emergency-type rounded-full bg-[#F3F4F6] px-4 py-2 font-semibold" data-type="obstetric">Obstetric</button>
		<button class="emergency-type rounded-full bg-[#F3F4F6] px-4 py-2 font-semibold" data-type="cardiac">Cardiac</button>
	</div>
	<div id="dispatch-status" class="max-w-lg text-sm text-gray-600">Tap SOS to start an emergency request.</div>
	<button id="voice-guide-link" class="text-sm font-semibold text-[#FF6B00]">Open voice first aid guide</button>
</div>
{% endblock %}
