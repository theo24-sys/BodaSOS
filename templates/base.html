<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#FF6B00">
    <link rel="manifest" href="/static/manifest.webmanifest">
    <title>{% block title %}BodaSOS{% endblock %}</title>
    {% block meta %}{% endblock %}
    <script src="https://cdn.tailwindcss.com"></script>
    {% block extra_css %}{% endblock %}
  </head>
  <body class="min-h-screen bg-white text-[#111827]">
    <header class="border-b border-gray-200 bg-[#F3F4F6] px-4 py-3">
      <div class="mx-auto flex max-w-6xl items-center justify-between gap-4">
        <div class="flex items-center gap-3">
          <div class="h-10 w-10 rounded-full bg-[#FF6B00]"></div>
          <div>
            <div class="text-lg font-bold tracking-tight">BodaSOS</div>
            <div class="text-xs text-gray-600">Emergency dispatch platform</div>
          </div>
        </div>
        {% if user.is_authenticated %}
          <div class="rounded-full bg-white px-3 py-1 text-sm shadow-sm ring-1 ring-gray-200">
            {{ user.role }} · {{ user.phone_number }}
          </div>
        {% endif %}
      </div>
    </header>
    <main>{% block content %}{% endblock %}</main>
    {% block extra_js %}{% endblock %}
  </body>
</html>
