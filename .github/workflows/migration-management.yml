name: Migration management

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  migrations:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install system deps for GeoDjango
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gdal-bin libgdal-dev libproj-dev build-essential

      - name: Install pip dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ensure git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run makemigrations
        run: |
          set -o pipefail
          python manage.py makemigrations --noinput || true

      - name: Check for generated migrations
        id: changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then echo "changed=true" >> $GITHUB_OUTPUT; else echo "changed=false" >> $GITHUB_OUTPUT; fi

      - name: Create PR with migrations
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(migrations): auto-generate migrations from models"
          branch: auto/migrations-${{ github.sha }}
          title: "Auto-generate migrations"
          body: |
            This PR contains migrations automatically generated by CI after model changes.
            Please review and merge to keep the repository's migrations in sync with the models.

      - name: Fail on generated migrations
        if: steps.changes.outputs.changed == 'true'
        run: |
          echo "Migrations were generated by CI. A PR has been created. Failing this job to prevent merges without committed migrations."
          exit 1
